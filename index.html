.mosaic {

}
.card-front, .card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  overflow: hidden;
  border-radius: 3px;
}
.card-front img, .card-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-back {
  transform: rotateY(180deg);
}
.card-back .no-back {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #2a1a0a;
  color: #c9a96e;
  font-size: 14px;
  text-align: center;
  padding: 12px;
  line-height: 1.4;
}
.card-front img {
  opacity: 0;
  transition: opacity 0.3s;
}
.card-front img.loaded {
  opacity: 1;
}
.card-front {
  background: #222;
}
.card-back {
  background: #1a1a1a;
}
</style>

const IIIF = "https://iiif-cloud.princeton.edu/iiif/2/";
function imgUrl(id, region, size) {
  return `${IIIF}${id}%2Fintermediate_file/${region}/!${size},${size}/0/default.jpg`;
}

// Shuffle
for (let i = posters.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [posters[i], posters[j]] = [posters[j], posters[i]];
}

const vw = window.innerWidth;
const vh = window.innerHeight;

const POSTER_ASPECT = 0.65;
let bestCols = 12, bestScore = Infinity;
for (let c = 8; c <= 20; c++) {
  const r = Math.ceil(posters.length / c);
  const cellAspect = (vw / c) / (vh / r);
  const score = Math.abs(cellAspect - POSTER_ASPECT);
  if (score < bestScore) { bestScore = score; bestCols = c; }
}
let bestRows = Math.ceil(posters.length / bestCols);

const total = bestCols * bestRows;
const origLen = posters.length;
while (posters.length < total) {
  posters.push(posters[Math.floor(Math.random() * origLen)]);
}

const mosaic = document.getElementById("mosaic");
mosaic.style.gridTemplateColumns = `repeat(${bestCols}, 1fr)`;
mosaic.style.gridTemplateRows = `repeat(${bestRows}, 1fr)`;

posters.forEach(p => {
  const card = document.createElement("a");
  card.className = "card";
  card.href = BASE + p.l;
  card.target = "_blank";
  card.rel = "noopener";
  card.title = p.t;

  const frontSrc = imgUrl(p.f, "full", 800);
  const backSrc = p.b ? imgUrl(p.b, "full", 800) : null;

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <img loading="lazy" alt="${p.t.replace(/"/g, '&quot;')}" src="${frontSrc}" onload="this.classList.add('loaded')">
      </div>
      <div class="card-back">
        ${backSrc
          ? `<img loading="lazy" alt="${p.t.replace(/"/g, '&quot;')} (back)" src="${backSrc}" onload="this.classList.add('loaded')">`
          : `<div class="no-back">${p.t}</div>`
        }
      </div>
    </div>`;

  mosaic.appendChild(card);
});
</script>
